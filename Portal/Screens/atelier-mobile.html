<!doctype html>
<html lang="fr" class="MobileAppScreenContext">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dymasco - Mobile</title>
  <link rel="stylesheet" href="../Styles/Dymasco/apriso.css">
  <link rel="stylesheet" href="../Styles/Dymasco/interpreter.css">
  <link rel="stylesheet" href="../Styles/Dymasco/keyboard.css">
</head>
<body>
  <div class="AprisoPortalShell">
    <header class="AprisoHeader">
      <h1 class="AprisoHeader-title">Dymasco mobile</h1>
      <div class="AprisoHeader-meta">MobileAppScreenContext</div>
    </header>
    <main class="AprisoMain">
      <section class="AprisoContentFrame">
        <div class="FIContentPanel">
          <h2 class="FIPageTitle">Poste atelier tablette</h2>

          <div class="FIGrid">
            <article class="FIMachineCard FIMachineCard--quality-alert dy-u-critical">
              <h4 class="FIMachineCard-title">Poste A3-04</h4>
              <p class="FIMachineCard-meta">Ecart dimensionnel</p>
              <button type="button" class="FIButton">Ouvrir</button>

          </div>
        </div>
      </section>
    </main>
